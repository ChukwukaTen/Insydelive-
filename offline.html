<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>InsydeLive — Offline</title>
<style>
  html,body{height:100%;margin:0;background:#140B22;color:#F4EEFF;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;}
  .wrap{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;}
  .logo{font-size:28px;font-weight:800;letter-spacing:-0.02em;color:#E4B94E;margin-bottom:8px;}
  p{color:#B9AEC9;max-width:320px;line-height:1.5;}
  button{margin-top:20px;background:#E4B94E;color:#140B22;border:none;border-radius:12px;padding:12px 24px;font-weight:700;font-size:15px;}
</style>
</head>
<body>
  <div class="wrap">
    <div class="logo">⚡ InsydeLive</div>
    <p>You're offline. Anything you do now (check-ins, requests, gifts) will be saved and sent automatically once you're back online.</p>
    <button onclick="location.reload()">Try again</button>
  </div>
</body>
</html>
